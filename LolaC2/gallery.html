<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Clarissa I. Bonifacio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="gallery.css">
</head>
<body>
    <div id="pageLoader" class="page-loader">
        <div class="spinner"></div>
    </div>

    <div class="navbar">
        <div class="navbar_links">
            <a href="index.html">Home</a>
            <a href="gallery.html">Gallery</a>
        </div>
    </div>

    <section class="gallery_section">
        <div class="gallery_header">
            <h2>Stories We Cherish</h2>
            <div class="divider"></div>
        </div>

        <div class="gallery_grid">
            <div class="gallery_item" data-category="travels">
                <div class="image_wrapper">
                    <img src="img/t1.jpg" alt="Travels">
                </div>
                <div class="item_info">
                    <h3>Travels</h3>
                    <p>Exploring the world and creating memories</p>
                </div>
            </div>

            <div class="gallery_item" data-category="family">
                <div class="image_wrapper">
                    <img src="img/1.jpg" alt="Family">
                </div>
                <div class="item_info">
                    <h3>Family</h3>
                    <p>Cherished moments with loved ones</p>
                </div>
            </div>

            <div class="gallery_item" data-category="solo">
                <div class="image_wrapper">
                    <img src="img/I1.jpg" alt="Solo">
                </div>
                <div class="item_info">
                    <h3>Solo</h3>
                    <p>Personal journeys and self-discovery</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Modal for expanded images -->
    <div id="imageModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-images" id="modalImages">
                <!-- Images will be loaded here -->
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
